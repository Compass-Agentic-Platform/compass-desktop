# Compass Desktop - macOS Signed Release Publisher
#
# ============================================================
# REQUIRED GITHUB SECRETS
# ============================================================
#
#   KORE_DESKTOP_REPO           Full clone URL of the source repository, including
#                             an embedded token for private access if needed.
#                             Format: https://<token>@github.com/<org>/<repo>.git
#
#   MAC_CSC_LINK              Base64-encoded .p12 Developer ID Application certificate.
#                             Generate with:
#                               base64 -i certificate.p12 | tr -d '\n'
#
#   MAC_CSC_KEY_PASSWORD      Password protecting the .p12 certificate file.
#
#   APPLE_ID                  Apple ID email address used for notarization.
#                             Example: developer@example.com
#
#   APPLE_ID_PASSWORD         App-specific password for the Apple ID above.
#                             Generate at: https://appleid.apple.com/account/manage
#
#   APPLE_TEAM_ID             10-character Apple Developer Team ID.
#                             Find it at: https://developer.apple.com/account
#
# ============================================================
# PREREQUISITES
# ============================================================
#
#   1. A GitHub Release must already exist in this repository before running
#      this workflow. The upload step targets the LATEST existing release.
#      If no release exists the workflow will fail with a descriptive error.
#
#   2. The source repository (KORE_DESKTOP_REPO) must contain a Node.js app
#      with a package.json and a build script that produces macOS artifacts
#      (DMG / ZIP) under a dist/ directory.
#
# ============================================================
# HOW TO TRIGGER
# ============================================================
#
#   1. Go to Actions → "Publish macOS (Signed)" → "Run workflow"
#   2. Optionally specify a branch/tag from the source repo (default: master)
#   3. Click "Run workflow"
#
# ============================================================

name: Publish macOS (Signed)

# ---------------------------------------------------------------------------
# Trigger: manual only — no automatic push/tag triggers
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch or tag to build from the source repository'
        required: false
        default: 'master'
        type: string

# ---------------------------------------------------------------------------
# Shared non-secret environment variables
# ---------------------------------------------------------------------------
env:
  ARTIFACT_DIR: source-app/dist

# ---------------------------------------------------------------------------
# Prevent concurrent runs of this workflow
# ---------------------------------------------------------------------------
concurrency:
  group: publish-mac-${{ github.run_id }}
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Token permissions — write access required to upload release assets
# ---------------------------------------------------------------------------
permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # master job: clone → build → sign → notarize → upload to latest release
  # ---------------------------------------------------------------------------
  build-mac:
    name: Build, Sign, Notarize & Upload to Latest Release
    runs-on: macos-latest
    environment: compass-desktop-build

    steps:
      # -----------------------------------------------------------------------
      # 1. Validate that required secrets are present before doing any work
      # -----------------------------------------------------------------------
      - name: Validate required secrets
        shell: bash
        env:
          KORE_DESKTOP_REPO: ${{ secrets.KORE_DESKTOP_REPO }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          MISSING=()
          [ -z "$KORE_DESKTOP_REPO" ]      && MISSING+=("KORE_DESKTOP_REPO")
          [ -z "$MAC_CSC_LINK" ]         && MISSING+=("MAC_CSC_LINK")
          [ -z "$MAC_CSC_KEY_PASSWORD" ] && MISSING+=("MAC_CSC_KEY_PASSWORD")
          [ -z "$APPLE_ID" ]             && MISSING+=("APPLE_ID")
          [ -z "$APPLE_ID_PASSWORD" ]    && MISSING+=("APPLE_ID_PASSWORD")
          [ -z "$APPLE_TEAM_ID" ]        && MISSING+=("APPLE_TEAM_ID")

          if [ ${#MISSING[@]} -gt 0 ]; then
            for secret in "${MISSING[@]}"; do
              echo "::error::Required secret is not set: $secret"
            done
            exit 1
          fi

          echo "All required secrets are present."

      # -----------------------------------------------------------------------
      # 2. Clone the source repository from the secret URL
      #    NOTE: We do NOT use actions/checkout here — the source lives in a
      #    separate private repository referenced only via the secret URL.
      #    The cloned code is placed in source-app/ to keep it isolated.
      # -----------------------------------------------------------------------
      - name: Clone source repository
        shell: bash
        env:
          KORE_DESKTOP_REPO: ${{ secrets.KORE_DESKTOP_REPO }}
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          BRANCH="${BRANCH:-master}"

          echo "Cloning branch '$BRANCH' from source repository..."
          git clone --depth 1 --branch "$BRANCH" "$KORE_DESKTOP_REPO" source-app

          echo "Clone complete. Contents:"
          ls -la source-app/

      # -----------------------------------------------------------------------
      # 3. Set up Node.js
      #    Using Node 20 LTS. If the source repo ships an .nvmrc, you can
      #    switch to: node-version-file: 'source-app/.nvmrc'
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: source-app/package-lock.json

      # Python is required by node-gyp for native modules (e.g. better-sqlite3, keytar)
      - name: Set up Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # -----------------------------------------------------------------------
      # 4. Install dependencies inside the cloned source app
      # -----------------------------------------------------------------------
      - name: Install dependencies
        working-directory: source-app
        run: npm ci

      # -----------------------------------------------------------------------
      # 5. Import the Apple Developer certificate into a temporary keychain
      #
      #    We create an isolated 'build.keychain' rather than touching the
      #    login keychain, so credentials never persist beyond this job.
      #    The cleanup step (at the bottom, with if: always()) removes it.
      # -----------------------------------------------------------------------
      - name: Import Apple Developer certificate
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          # Decode the base64-encoded .p12 to a temporary file
          CERT_FILE="$(mktemp /tmp/certificate.XXXXXX.p12)"
          echo "$MAC_CSC_LINK" | base64 --decode > "$CERT_FILE"

          # Create a dedicated build keychain with a known password
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          # Import the certificate into the build keychain
          security import "$CERT_FILE" \
            -k build.keychain \
            -P "$MAC_CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the key without a UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Make build.keychain the default so codesign finds it
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s build.keychain

          # Clean up the temporary .p12 file
          rm -f "$CERT_FILE"

          echo "Certificate imported successfully."

      # -----------------------------------------------------------------------
      # 6. Verify the signing identity is available before attempting to build
      # -----------------------------------------------------------------------
      - name: Verify signing identity
        shell: bash
        run: |
          echo "Available code-signing identities:"
          security find-identity -v -p codesigning build.keychain

          # Fail fast if no Developer ID Application identity is found
          if ! security find-identity -v -p codesigning build.keychain | grep -q "Developer ID Application"; then
            echo "::error::No 'Developer ID Application' identity found in build.keychain."
            echo "::error::Ensure MAC_CSC_LINK contains a valid Developer ID Application certificate."
            exit 1
          fi

          echo "Signing identity verified."

      # -----------------------------------------------------------------------
      # 7. Ensure build/entitlements.mac.plist exists in the source app
      #
      #    electron-builder passes this path to codesign. If the file is
      #    missing or malformed the signing step fails with:
      #      "build/entitlements.mac.plist: cannot read entitlement data"
      #
      #    We create the file here if it doesn't already exist, so the
      #    workflow is resilient to source repos that omit it.
      #    The entitlements below are the standard set for a sandboxed
      #    Electron app distributed outside the Mac App Store.
      # -----------------------------------------------------------------------
      - name: Ensure entitlements file exists
        shell: bash
        run: |
          ENTITLEMENTS_PATH="source-app/build/entitlements.mac.plist"

          if [ -f "$ENTITLEMENTS_PATH" ]; then
            echo "Entitlements file already exists at $ENTITLEMENTS_PATH"
            echo "Contents:"
            cat "$ENTITLEMENTS_PATH"
          else
            echo "Entitlements file not found — creating default at $ENTITLEMENTS_PATH"
            mkdir -p "source-app/build"
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '  <dict>' \
              '    <key>com.apple.security.cs.allow-jit</key>' \
              '    <true/>' \
              '    <key>com.apple.security.cs.allow-unsigned-executable-memory</key>' \
              '    <true/>' \
              '    <key>com.apple.security.cs.disable-library-validation</key>' \
              '    <true/>' \
              '  </dict>' \
              '</plist>' \
              > "$ENTITLEMENTS_PATH"
            echo "Entitlements file created."
          fi

          # Validate the plist is well-formed XML before proceeding
          if ! plutil -lint "$ENTITLEMENTS_PATH"; then
            echo "::error::$ENTITLEMENTS_PATH is not a valid plist file."
            echo "File contents:"
            cat "$ENTITLEMENTS_PATH"
            exit 1
          fi

          echo "Entitlements file is valid."

      # -----------------------------------------------------------------------
      # 8. Disable any afterSign notarize hook in the source app
      #
      #    Many Electron apps include a custom afterSign script (typically
      #    scripts/notarize.js) that calls @electron/notarize directly.
      #    These hooks are fragile — they may use outdated APIs, miss the
      #    teamId parameter, or fail silently.
      #
      #    Instead of patching the hook, we DISABLE it entirely and handle
      #    all notarization ourselves in Step 11 using xcrun notarytool.
      #    This gives us full control and clear error messages.
      #
      #    We disable the hook by:
      #      a) Removing afterSign from package.json build config
      #      b) Removing afterSign from standalone electron-builder configs
      #      c) The override config in Step 9 also sets afterSign to null
      # -----------------------------------------------------------------------
      - name: Disable afterSign notarize hook
        shell: bash
        working-directory: source-app
        run: |
          echo "=== Disabling any afterSign hooks (notarization handled in Step 11) ==="

          # Remove afterSign from package.json build config
          if [ -f package.json ]; then
            HAS_AFTER_SIGN=$(node -e "
              const pkg = require('./package.json');
              if (pkg.build && pkg.build.afterSign) console.log(pkg.build.afterSign);
            " 2>/dev/null || true)

            if [ -n "$HAS_AFTER_SIGN" ]; then
              echo "Found afterSign in package.json: $HAS_AFTER_SIGN"
              echo "Removing afterSign from package.json..."
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
                if (pkg.build && pkg.build.afterSign) {
                  delete pkg.build.afterSign;
                  fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
                  console.log('afterSign removed from package.json');
                }
              "
            else
              echo "No afterSign in package.json"
            fi
          fi

          # Remove afterSign from standalone electron-builder JSON config files
          for CFG_FILE in electron-builder.json electron-builder.json5; do
            if [ -f "$CFG_FILE" ]; then
              HAS_AFTER_SIGN=$(node -e "
                const cfg = require('./$CFG_FILE');
                if (cfg.afterSign) console.log(cfg.afterSign);
              " 2>/dev/null || true)

              if [ -n "$HAS_AFTER_SIGN" ]; then
                echo "Found afterSign in $CFG_FILE: $HAS_AFTER_SIGN"
                echo "Removing afterSign from $CFG_FILE..."
                node -e "
                  const fs = require('fs');
                  const cfg = JSON.parse(fs.readFileSync('./$CFG_FILE', 'utf8'));
                  delete cfg.afterSign;
                  fs.writeFileSync('./$CFG_FILE', JSON.stringify(cfg, null, 2) + '\n');
                  console.log('afterSign removed from $CFG_FILE');
                "
              else
                echo "No afterSign in $CFG_FILE"
              fi
            fi
          done

          # Remove afterSign from YAML config files
          if [ -f electron-builder.yml ]; then
            if grep -q 'afterSign' electron-builder.yml; then
              echo "Found afterSign in electron-builder.yml — commenting it out"
              sed -i.bak 's/^\(.*afterSign.*\)$/# DISABLED: \1/' electron-builder.yml
              rm -f electron-builder.yml.bak
              echo "Updated electron-builder.yml:"
              cat electron-builder.yml
            else
              echo "No afterSign in electron-builder.yml"
            fi
          fi

          echo ""
          echo "All afterSign hooks disabled. Notarization will be handled in Step 11."

      # -----------------------------------------------------------------------
      # 9. Write electron-builder override — disable built-in notarization
      #
      #    We disable BOTH afterSign and mac.notarize in the override config.
      #    All notarization is handled explicitly in Step 11 using
      #    xcrun notarytool, which gives us:
      #      - Full control over credentials
      #      - Clear error messages on failure
      #      - Ability to notarize both .app and DMG
      #      - Retry logic for CDN propagation delays
      #
      #    The --config flag in step 10 merges this file on top of whatever
      #    config already exists in the source app.
      # -----------------------------------------------------------------------
      - name: Write electron-builder override (no built-in notarization)
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Diagnostic: confirm the secret is available at this step
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::APPLE_TEAM_ID secret is empty — notarization will fail in Step 11."
            exit 1
          fi
          echo "APPLE_TEAM_ID is set (length: ${#APPLE_TEAM_ID})"

          # Disable both afterSign and mac.notarize — Step 11 handles everything
          printf '%s\n' \
            '{' \
            '  "afterSign": null,' \
            '  "mac": {' \
            '    "notarize": false' \
            '  }' \
            '}' \
            > source-app/electron-builder.override.json

          echo "Override config written (notarization disabled — handled in Step 11):"
          cat source-app/electron-builder.override.json

      # -----------------------------------------------------------------------
      # 10. Build the macOS app, sign it, and notarize
      #
      #    electron-builder uses CSC_LINK / CSC_KEY_PASSWORD to sign the .app.
      #    The --config flag merges our override (with mac.notarize) on top of
      #    whatever config already exists in the source app's package.json.
      #
      #    Expected output: source-app/dist/*.dmg and source-app/dist/*.zip
      # -----------------------------------------------------------------------
      - name: Build, sign & notarize
        working-directory: source-app
        shell: bash
        env:
          # Code signing — electron-builder reads these directly
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization — electron-builder v24+ uses APPLE_APP_SPECIFIC_PASSWORD;
          # older versions (and custom notarize.js hooks) use APPLE_ID_PASSWORD.
          # We set both to the same secret so the workflow works with either version.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Prevent electron-builder from publishing — we handle that ourselves
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --mac --publish never --config electron-builder.override.json

      # -----------------------------------------------------------------------
      # 11. Notarize the .app and DMG, then staple tickets
      #
      #    We handle ALL notarization here using xcrun notarytool directly.
      #    This is more reliable than electron-builder's built-in notarization
      #    or afterSign hooks because:
      #      - We control the exact credentials passed
      #      - We get clear error messages on failure
      #      - We can notarize both .app and DMG in sequence
      #      - We can add retry logic for CDN propagation delays
      #
      #    Sequence:
      #      1. Store credentials in a notarytool profile (avoids passing
      #         secrets as CLI args which can leak in logs)
      #      2. Notarize the .app bundle inside the DMG
      #      3. Notarize the DMG itself
      #      4. Staple tickets to both with retry logic
      # -----------------------------------------------------------------------
      - name: Notarize & staple .app and DMG
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          # ---- Validate credentials before attempting notarization ----
          echo "=== Credential validation ==="
          if [ -z "${APPLE_ID:-}" ]; then
            echo "::error::APPLE_ID is empty"
            exit 1
          fi
          if [ -z "${APPLE_ID_PASSWORD:-}" ]; then
            echo "::error::APPLE_ID_PASSWORD is empty"
            exit 1
          fi
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::error::APPLE_TEAM_ID is empty"
            exit 1
          fi
          echo "APPLE_ID is set: ${APPLE_ID}"
          echo "APPLE_TEAM_ID is set (length: ${#APPLE_TEAM_ID}): ${APPLE_TEAM_ID:0:3}..."
          echo "APPLE_ID_PASSWORD is set (length: ${#APPLE_ID_PASSWORD})"

          # ---- Store credentials in a notarytool keychain profile ----
          # This avoids passing secrets as CLI arguments (which appear in
          # process listings and can leak in logs). The profile is stored
          # in the temporary build keychain.
          echo ""
          echo "=== Storing notarytool credentials in keychain profile ==="
          xcrun notarytool store-credentials "AC_PASSWORD" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          echo "Credentials stored in profile 'AC_PASSWORD'"

          # ---- Find the DMG ----
          DMG_FILE="$(find source-app/dist -name '*.dmg' | head -1)"
          if [ -z "$DMG_FILE" ]; then
            echo "::error::No .dmg file found in source-app/dist. Build may have failed."
            exit 1
          fi
          echo ""
          echo "Found DMG: $DMG_FILE"

          # ---- Find the .app bundle ----
          # The .app is inside the mac/ or mac-arm64/ output directory
          APP_FILE="$(find source-app/dist -name '*.app' -type d | head -1)"
          if [ -n "$APP_FILE" ]; then
            echo "Found .app: $APP_FILE"
          else
            echo "::warning::No .app bundle found in source-app/dist — will notarize DMG only"
          fi

          # ---- Code-sign the DMG ----
          # electron-builder does NOT code-sign DMG files by default.
          # It only signs the .app bundle inside. Without a code signature
          # on the DMG itself, Gatekeeper rejects it with "no usable signature"
          # even after successful notarization and stapling.
          echo ""
          echo "=== Code-signing the DMG ==="
          SIGN_IDENTITY="$(security find-identity -v -p codesigning build.keychain \
            | grep 'Developer ID Application' \
            | head -1 \
            | sed 's/.*"\(.*\)"/\1/')"

          if [ -z "$SIGN_IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in build.keychain."
            exit 1
          fi
          echo "Signing identity: $SIGN_IDENTITY"

          codesign --force --sign "$SIGN_IDENTITY" --timestamp "$DMG_FILE"
          echo "DMG signed successfully."

          # Verify the signature was applied
          echo "Verifying DMG signature..."
          codesign --verify --verbose "$DMG_FILE"
          echo "DMG signature verified."

          # ---- Helper function: notarize a file ----
          notarize_file() {
            local FILE="$1"
            local LABEL="$2"
            echo ""
            echo "=== Submitting $LABEL for notarization ==="
            echo "File: $FILE"

            xcrun notarytool submit "$FILE" \
              --keychain-profile "AC_PASSWORD" \
              --wait \
              --timeout 600

            echo "$LABEL notarization complete."
          }

          # ---- Helper function: staple with retry ----
          staple_file() {
            local FILE="$1"
            local LABEL="$2"
            local MAX_ATTEMPTS=6
            local WAIT_SECONDS=50
            local ATTEMPT=0

            echo ""
            echo "=== Stapling ticket to $LABEL ==="

            until xcrun stapler staple "$FILE"; do
              ATTEMPT=$((ATTEMPT + 1))
              if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
                echo "::error::xcrun stapler failed for $LABEL after $MAX_ATTEMPTS attempts."
                exit 1
              fi
              echo "Staple attempt $ATTEMPT/$MAX_ATTEMPTS failed (ticket not yet propagated). Waiting ${WAIT_SECONDS}s..."
              sleep "$WAIT_SECONDS"
            done

            echo "$LABEL stapled successfully."
          }

          # ---- Notarize the .app bundle (if found) ----
          if [ -n "$APP_FILE" ]; then
            # notarytool requires a zip for .app bundles
            echo ""
            echo "=== Zipping .app for notarization ==="
            APP_ZIP="$(mktemp /tmp/app-notarize.XXXXXX.zip)"
            ditto -c -k --keepParent "$APP_FILE" "$APP_ZIP"
            echo "Zipped to: $APP_ZIP ($(du -h "$APP_ZIP" | cut -f1))"

            notarize_file "$APP_ZIP" ".app bundle"
            staple_file "$APP_FILE" ".app bundle"

            rm -f "$APP_ZIP"
          fi

          # ---- Notarize the DMG ----
          notarize_file "$DMG_FILE" "DMG"
          staple_file "$DMG_FILE" "DMG"

          # ---- Verify notarization and signatures ----
          echo ""
          echo "=== Verifying notarization and signatures ==="

          # 1. Verify the notarization ticket is stapled to the DMG
          echo "--- Validating stapled ticket on DMG ---"
          xcrun stapler validate "$DMG_FILE"
          echo "DMG staple validation passed."

          # 2. Verify the code signature on the DMG
          echo ""
          echo "--- Verifying DMG code signature ---"
          codesign --verify --verbose "$DMG_FILE"
          echo "DMG code signature valid."

          # 3. Verify Gatekeeper acceptance of the DMG
          #    NOTE: We use --type install for disk images, not --type open.
          #    --type open is for documents; --type execute is for apps;
          #    --type install is for packages and disk images.
          echo ""
          echo "--- Gatekeeper assessment ---"
          spctl --assess --type install -v "$DMG_FILE"
          echo "DMG passed Gatekeeper assessment."

          # 4. Verify the .app bundle if present
          if [ -n "$APP_FILE" ]; then
            echo ""
            echo "--- Validating stapled ticket on .app ---"
            xcrun stapler validate "$APP_FILE"
            echo ".app staple validation passed."

            echo ""
            echo "--- Gatekeeper assessment of .app ---"
            spctl --assess --type execute -v "$APP_FILE"
            echo ".app passed Gatekeeper assessment."
          fi

          echo ""
          echo "All notarization, stapling, and verification complete."

      # -----------------------------------------------------------------------
      # 12. Find the latest GitHub Release and upload all build artifacts
      #
      #    We use the GitHub REST API to:
      #      a) Fetch the latest release and its upload URL
      #      b) Delete any existing assets with the same filename (idempotency)
      #      c) Upload each artifact (DMG, ZIP, blockmap, latest-mac.yml)
      # -----------------------------------------------------------------------
      - name: Upload artifacts to latest release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/${REPO}"

          # ---- a) Get the latest release ----
          echo "Fetching latest release for ${REPO}..."
          RELEASE_JSON="$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "${API}/releases/latest")"

          RELEASE_ID="$(echo "$RELEASE_JSON" | jq -r '.id // empty')"
          UPLOAD_URL="$(echo "$RELEASE_JSON" | jq -r '.upload_url // empty')"

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "::error::No existing GitHub Release found in ${REPO}."
            echo "::error::Please create a release first, then re-run this workflow."
            exit 1
          fi

          # Strip the {?name,label} template suffix from the upload URL
          UPLOAD_URL="${UPLOAD_URL%%\{*}"
          echo "Targeting release ID: ${RELEASE_ID}"
          echo "Upload URL: ${UPLOAD_URL}"

          # ---- b) Collect artifacts to upload ----
          ARTIFACTS=()
          while IFS= read -r -d '' f; do
            ARTIFACTS+=("$f")
          done < <(find source-app/dist \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.blockmap' -o -name 'latest-mac.yml' \) \
            -print0)

          if [ ${#ARTIFACTS[@]} -eq 0 ]; then
            echo "::error::No artifacts found in source-app/dist to upload."
            exit 1
          fi

          echo "Artifacts to upload:"
          printf '  %s\n' "${ARTIFACTS[@]}"

          # ---- c) Fetch existing assets on the release ----
          EXISTING_ASSETS="$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "${API}/releases/${RELEASE_ID}/assets")"

          # ---- d) Upload each artifact ----
          for ARTIFACT in "${ARTIFACTS[@]}"; do
            FILENAME="$(basename "$ARTIFACT")"

            # Delete any existing asset with the same name (idempotent re-runs)
            EXISTING_ID="$(echo "$EXISTING_ASSETS" | jq -r --arg name "$FILENAME" \
              '.[] | select(.name == $name) | .id // empty')"

            if [ -n "$EXISTING_ID" ]; then
              echo "Deleting existing asset '${FILENAME}' (ID: ${EXISTING_ID})..."
              curl -s -X DELETE \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "${API}/releases/assets/${EXISTING_ID}"
            fi

            # Determine MIME type
            case "$FILENAME" in
              *.dmg)       MIME="application/x-apple-diskimage" ;;
              *.zip)       MIME="application/zip" ;;
              *.blockmap)  MIME="application/octet-stream" ;;
              *.yml|*.yaml) MIME="text/yaml" ;;
              *)           MIME="application/octet-stream" ;;
            esac

            echo "Uploading '${FILENAME}' (${MIME})..."
            HTTP_STATUS="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: ${MIME}" \
              --data-binary @"$ARTIFACT" \
              "${UPLOAD_URL}?name=${FILENAME}")"

            if [[ "$HTTP_STATUS" != "20"* ]]; then
              echo "::error::Upload of '${FILENAME}' failed with HTTP status ${HTTP_STATUS}."
              exit 1
            fi

            echo "  Uploaded '${FILENAME}' — HTTP ${HTTP_STATUS}"
          done

          echo "All artifacts uploaded successfully."

      # -----------------------------------------------------------------------
      # CLEANUP — always runs, even if earlier steps fail
      # Removes the temporary build keychain so credentials don't linger
      # -----------------------------------------------------------------------
      - name: Clean up build keychain
        if: always()
        shell: bash
        run: |
          if security list-keychains | grep -q "build.keychain"; then
            echo "Removing temporary build keychain..."
            security delete-keychain build.keychain || true
            echo "Keychain removed."
          else
            echo "No build.keychain to clean up."
          fi
